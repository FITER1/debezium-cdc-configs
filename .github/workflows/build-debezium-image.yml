name: Build Debezium Connect Image

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile.connect"
      - ".github/workflows/build-debezium-image.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (default: short commit SHA)"
        required: false

env:
  AWS_REGION: us-east-2
  AWS_ACCOUNT_ID: "916148231619"
  ECR_REPO: core/kafka-connect-debezium

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ECR_PUSH_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag }}"
          [ -z "$TAG" ] && TAG="${GITHUB_SHA::8}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.connect
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:${{ steps.tag.outputs.tag }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
